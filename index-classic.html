<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LocalView — Dev Projects</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d0f14;
    color: #e2e8f0;
    min-height: 100vh;
    padding: 32px 28px;
  }

  header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 32px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  h1 { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
  h1 span { color: #818cf8; }
  .subtitle { font-size: 13px; color: #475569; margin-top: 2px; }

  .meta { display: flex; align-items: center; gap: 12px; }
  .live-badge { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .refresh-btn {
    background: #1e2130; border: 1px solid #2d3148;
    color: #94a3b8; padding: 6px 14px; border-radius: 8px;
    cursor: pointer; font-size: 13px; transition: all .15s;
  }
  .refresh-btn:hover { background: #262a40; color: #e2e8f0; }

  @keyframes livePulse {
    0%   { background: #22c55e; box-shadow: 0 0 0 0 #22c55e88; }
    50%  { background: #4ade80; box-shadow: 0 0 0 6px #22c55e00; }
    100% { background: #22c55e; box-shadow: 0 0 0 0 #22c55e00; }
  }
  .live-badge.flash .dot { animation: livePulse 0.8s ease-out; }

  .stats { display: flex; gap: 14px; margin-bottom: 28px; }
  .stat {
    background: #13151f; border: 1px solid #1e2130;
    border-radius: 12px; padding: 16px 22px; flex: 1;
  }
  .stat .label { font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
  .stat .value { font-size: 30px; font-weight: 700; }
  .stat .value.purple { color: #a855f7; }
  .stat .value.blue   { color: #60a5fa; }
  .stat .value.green  { color: #22c55e; }

  .search-bar {
    background: #13151f; border: 1px solid #1e2130;
    border-radius: 10px; padding: 10px 16px;
    width: 100%; color: #e2e8f0; font-size: 14px;
    margin-bottom: 20px; outline: none; transition: border-color .15s;
  }
  .search-bar:focus { border-color: #6366f1; }
  .search-bar::placeholder { color: #374151; }

  /* Card flip setup */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
  }

  .card-wrap {
    perspective: 1000px;
    height: 230px;
  }

  .card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
  }

  .card-wrap.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 14px;
    border: 1px solid #1e2130;
    overflow: hidden;
  }

  .card-front {
    background: #13151f;
    cursor: pointer;
    display: flex; flex-direction: column;
    transition: border-color .15s;
  }
  .card-front:hover { border-color: #2d3148; }

  .card-back {
    background: #111318;
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
  }

  .card-accent {
    height: 3px; flex-shrink: 0;
    border-radius: 14px 14px 0 0;
  }

  /* FRONT */
  .front-body {
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 12px; flex: 1;
  }

  .card-header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
  }
  .app-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
  .app-icon {
    width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .app-info { min-width: 0; flex: 1; }
  .app-name-wrap {
    display: flex; align-items: center; gap: 6px; min-width: 0;
  }
  .app-name {
    font-size: 15px; font-weight: 700; color: #f1f5f9;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: text;
  }
  .rename-btn {
    background: none; border: none; color: #1f2937; cursor: pointer;
    font-size: 12px; padding: 0; flex-shrink: 0;
    transition: color .15s; line-height: 1;
  }
  .app-name-wrap:hover .rename-btn { color: #475569; }
  .rename-input {
    background: #0d0f14; border: 1px solid #6366f1;
    border-radius: 6px; color: #f1f5f9; font-size: 14px;
    font-weight: 700; padding: 2px 8px; width: 100%;
    outline: none; min-width: 0;
  }
  .app-dir {
    font-size: 11px; color: #374151; margin-top: 3px;
    font-family: 'SF Mono', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; margin-left: 10px; }

  .framework-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600; white-space: nowrap;
  }

  .stop-btn {
    background: #2e1010; border: 1px solid #7f1d1d;
    color: #f87171; padding: 3px 8px; border-radius: 6px;
    cursor: pointer; font-size: 11px; font-weight: 600;
    transition: all .15s; white-space: nowrap;
    display: flex; align-items: center; gap: 4px;
  }
  .stop-btn:hover { background: #450a0a; border-color: #ef4444; color: #fca5a5; }
  .stop-btn.stopping { opacity: .5; pointer-events: none; }

  /* Rows */
  .card-row { display: flex; align-items: center; gap: 8px; }
  .row-label {
    font-size: 10px; color: #374151;
    text-transform: uppercase; letter-spacing: .06em;
    width: 54px; flex-shrink: 0;
  }

  .branch-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #1a1f2e; border: 1px solid #2d3148;
    border-radius: 6px; padding: 2px 8px;
    font-size: 12px; font-family: 'SF Mono', monospace; color: #94a3b8;
  }
  .branch-badge.dirty { border-color: #854d0e; color: #fbbf24; }

  .ports-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
  .port-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: #1e2130; border: 1px solid #2d3148;
    border-radius: 6px; padding: 2px 8px;
    font-size: 12px; font-family: 'SF Mono', monospace; color: #818cf8;
    text-decoration: none; transition: all .12s;
  }
  .port-pill:hover { background: #1e2238; border-color: #6366f1; color: #a5b4fc; }
  .port-dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }

  .backends-wrap { display: flex; gap: 5px; flex-wrap: wrap; }
  .backend-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 7px; border-radius: 5px;
    font-size: 11px; font-weight: 500;
  }

  .flip-hint {
    font-size: 10px; color: #1f2937; text-align: right;
    margin-top: auto; padding-top: 4px;
  }

  /* BACK */
  .back-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    border-bottom: 1px solid #1e2130;
  }
  .back-title { font-size: 14px; font-weight: 700; color: #e2e8f0; }
  .back-close {
    background: none; border: none; color: #475569;
    cursor: pointer; font-size: 18px; line-height: 1;
    transition: color .12s; padding: 0 4px;
  }
  .back-close:hover { color: #94a3b8; }

  .back-body { padding: 12px 16px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .back-path {
    font-family: 'SF Mono', monospace; font-size: 11px;
    color: #475569; background: #0d0f14; border-radius: 6px;
    padding: 6px 10px; word-break: break-all;
  }

  .back-section-label {
    font-size: 10px; color: #374151; text-transform: uppercase;
    letter-spacing: .06em; margin-bottom: 4px;
  }

  .readme-text {
    font-size: 12px; color: #64748b; line-height: 1.6;
    max-height: 110px; overflow-y: auto;
    background: #0d0f14; border-radius: 6px; padding: 8px 10px;
  }
  .readme-text::-webkit-scrollbar { width: 3px; }
  .readme-text::-webkit-scrollbar-thumb { background: #1e2130; border-radius: 2px; }

  .no-readme { font-size: 12px; color: #1f2937; font-style: italic; }

  .back-backends { display: flex; flex-wrap: wrap; gap: 5px; }

  /* States */
  .empty { grid-column: 1/-1; text-align: center; padding: 60px; color: #374151; }
  .empty .big { font-size: 48px; margin-bottom: 12px; }
  .loading { grid-column:1/-1; text-align: center; padding: 60px; color: #374151; }
  .spinner {
    width: 26px; height: 26px; border: 2px solid #1e2130;
    border-top-color: #6366f1; border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .last-updated { font-size: 11px; color: #1e2130; margin-top: 20px; text-align: right; }

  .stopped-overlay {
    position: absolute; inset: 0; background: rgba(13,15,20,.85);
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px; z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  .stopped-overlay.show { opacity: 1; }
  .stopped-msg { font-size: 14px; color: #f87171; font-weight: 700; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <h1>Local<span>View</span></h1>
      <div class="subtitle">Running dev projects on this machine</div>
    </div>
  </div>
  <div class="meta">
    <div class="live-badge" id="live-badge"><span class="dot"></span> <span id="live-label">Connecting…</span></div>
    <button class="refresh-btn" onclick="load()">↻ Refresh</button>
  </div>
</header>

<div class="stats">
  <div class="stat"><div class="label">Projects running</div><div class="value purple" id="s-projects">—</div></div>
  <div class="stat"><div class="label">Frameworks</div><div class="value blue" id="s-fw">—</div></div>
  <div class="stat"><div class="label">Ports open</div><div class="value green" id="s-ports">—</div></div>
</div>

<input class="search-bar" id="search" placeholder="Search project, framework, backend, port, branch…" oninput="render()" />

<div class="grid" id="grid">
  <div class="loading"><div class="spinner"></div>Scanning dev processes…</div>
</div>

<div class="last-updated" id="last-updated"></div>

<script>
let data = [];
const flipped = new Set(); // stores project dir paths

function shortDir(dir) {
  return dir.replace('/Users/rajav/', '~/');
}

function wrapId(dir) {
  return 'wrap-' + btoa(dir).replace(/[^a-z0-9]/gi, '');
}

function stopBtnId(dir) {
  return 'stop-' + btoa(dir).replace(/[^a-z0-9]/gi, '');
}

async function stopProject(dir, event) {
  event.stopPropagation();
  const btn = document.getElementById(stopBtnId(dir));
  if (!btn) return;
  btn.classList.add('stopping');
  btn.innerHTML = '⏳ Stopping…';

  try {
    const res = await fetch('/api/kill', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ dir })
    });
    if (res.ok) {
      const wrap = document.getElementById(wrapId(dir));
      if (wrap) {
        const overlay = wrap.querySelector('.stopped-overlay');
        if (overlay) overlay.classList.add('show');
        setTimeout(() => load(), 1500);
      }
    }
  } catch (e) {
    if (btn) { btn.innerHTML = '⏹ Stop'; btn.classList.remove('stopping'); }
  }
}

function flipCard(dir) {
  const wrap = document.getElementById(wrapId(dir));
  if (!wrap) return;
  if (flipped.has(dir)) {
    flipped.delete(dir);
    wrap.classList.remove('flipped');
  } else {
    flipped.add(dir);
    wrap.classList.add('flipped');
  }
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = data.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.framework.toLowerCase().includes(q) ||
    (p.branch || '').toLowerCase().includes(q) ||
    p.ports.some(port => String(port).includes(q)) ||
    p.dir.toLowerCase().includes(q) ||
    (p.backends || []).some(b => b.label.toLowerCase().includes(q))
  );

  document.getElementById('s-projects').textContent = data.length;
  document.getElementById('s-fw').textContent = new Set(data.map(p => p.framework)).size;
  document.getElementById('s-ports').textContent = data.reduce((a, p) => a + p.ports.length, 0);

  if (filtered.length === 0) {
    document.getElementById('grid').innerHTML = `
      <div class="empty"><div class="big">🔌</div>
      <p>${q ? 'No matches.' : 'No dev servers detected.'}</p></div>`;
    return;
  }

  document.getElementById('grid').innerHTML = filtered.map((p) => {
    const wid = wrapId(p.dir);
    const sid = stopBtnId(p.dir);
    const dirEsc = p.dir.replace(/'/g, "\\'");
    const accentColor = p.color || '#6366f1';

    const fwTag = `<span class="framework-tag" style="background:${p.bg};color:${p.color};">${p.icon} ${p.framework}</span>`;

    const branchHtml = p.branch
      ? `<span class="branch-badge ${p.dirty ? 'dirty' : ''}">⎇ ${p.branch}${p.dirty ? ' ●' : ''}</span>`
      : `<span style="color:#1f2937;font-size:12px;">—</span>`;

    const portsHtml = p.ports.length
      ? `<div class="ports-wrap">${p.ports.map(port =>
          `<a href="http://localhost:${port}" target="_blank" class="port-pill" onclick="event.stopPropagation()">
            <span class="port-dot"></span>:${port}↗
          </a>`).join('')}</div>`
      : `<span style="color:#1f2937;font-size:12px;">starting up…</span>`;

    const backendsHtml = (p.backends || []).length
      ? `<div class="card-row">
          <span class="row-label">Stack</span>
          <div class="backends-wrap">${p.backends.map(b =>
            `<span class="backend-chip" style="background:${b.bg};color:${b.color};">${b.icon} ${b.label}</span>`
          ).join('')}</div>
        </div>`
      : '';

    const readmeHtml = p.readme
      ? `<div><div class="back-section-label">About</div><div class="readme-text">${p.readme.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`
      : `<div><div class="back-section-label">About</div><div class="no-readme">No README found</div></div>`;

    const backBackendsHtml = (p.backends || []).length
      ? `<div>
          <div class="back-section-label">Tech Stack</div>
          <div class="back-backends">${p.backends.map(b =>
            `<span class="backend-chip" style="background:${b.bg};color:${b.color};">${b.icon} ${b.label}</span>`
          ).join('')}</div>
        </div>`
      : '';

    return `
    <div class="card-wrap" id="${wid}">
      <div class="card-inner">

        <!-- FRONT -->
        <div class="card-front" onclick="flipCard('${dirEsc}')">
          <div class="card-accent" style="background:${accentColor};opacity:.55;"></div>
          <div class="front-body">
            <div class="card-header">
              <div class="app-left">
                <div class="app-icon" style="background:${p.bg};color:${p.color};">${p.icon}</div>
                <div class="app-info">
                  <div class="app-name-wrap" onclick="event.stopPropagation()">
                    <div class="app-name" id="name-${wid}" onclick="startRename('${dirEsc}','${wid}')">${p.name}</div>
                    <button class="rename-btn" title="Rename" onclick="startRename('${dirEsc}','${wid}')">✏️</button>
                  </div>
                  <div class="app-dir">${shortDir(p.dir)}</div>
                </div>
              </div>
              <div class="card-right">
                ${fwTag}
                <button id="${sid}" class="stop-btn" onclick="stopProject('${dirEsc}',event)">⏹ Stop</button>
              </div>
            </div>

            <div class="card-row">
              <span class="row-label">Branch</span>${branchHtml}
            </div>
            <div class="card-row">
              <span class="row-label">Ports</span>${portsHtml}
            </div>
            ${backendsHtml}
            <div class="flip-hint">Click card to see details →</div>
          </div>
          <div class="stopped-overlay"><span class="stopped-msg">⏹ Server stopped</span></div>
        </div>

        <!-- BACK -->
        <div class="card-back">
          <div class="card-accent" style="background:${accentColor};opacity:.55;"></div>
          <div class="back-header">
            <div class="back-title">${p.name}</div>
            <button class="back-close" onclick="flipCard('${dirEsc}')">✕</button>
          </div>
          <div class="back-body">
            <div>
              <div class="back-section-label">Full Path</div>
              <div class="back-path">${p.dir}</div>
            </div>
            ${backBackendsHtml}
            ${readmeHtml}
          </div>
        </div>

      </div>
    </div>`;
  }).join('');

  // Reapply flipped state after DOM rebuild
  for (const dir of flipped) {
    const wrap = document.getElementById(wrapId(dir));
    if (wrap) wrap.classList.add('flipped');
  }
}

function startRename(dir, wid) {
  const nameEl = document.getElementById('name-' + wid);
  if (!nameEl || nameEl.querySelector('input')) return; // already editing
  const current = nameEl.textContent.trim();
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = current;
  nameEl.innerHTML = '';
  nameEl.appendChild(input);
  input.focus();
  input.select();

  async function save() {
    const newName = input.value.trim() || current;
    nameEl.textContent = newName; // optimistic update
    try {
      await fetch('/api/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dir, name: newName === (data.find(p=>p.dir===dir)?.defaultName) ? '' : newName })
      });
    } catch {}
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); save(); input.blur(); }
    if (e.key === 'Escape') { nameEl.textContent = current; input.blur(); }
  });
  input.addEventListener('blur', save);
}

function flashLiveBadge() {
  const badge = document.getElementById('live-badge');
  if (!badge) return;
  badge.classList.add('flash');
  setTimeout(() => badge.classList.remove('flash'), 800);
}

function setConnectionStatus(connected) {
  const dot = document.querySelector('.dot');
  const label = document.getElementById('live-label');
  if (!dot || !label) return;
  if (connected) {
    dot.style.background = '#22c55e';
    label.textContent = 'Live';
  } else {
    dot.style.background = '#ef4444';
    label.textContent = 'Reconnecting…';
  }
}

function applyUpdate(projects) {
  const isFirstLoad = data.length === 0;
  const prev = new Set(data.map(p => p.dir));
  const next = new Set(projects.map(p => p.dir));

  const added   = projects.filter(p => !prev.has(p.dir));
  const removed = data.filter(p => !next.has(p.dir));

  data = projects;
  render();

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date().toLocaleTimeString();

  if (!isFirstLoad) {
    if (added.length || removed.length) flashLiveBadge();
    // Briefly highlight newly added cards
    for (const p of added) {
      const wrap = document.getElementById(wrapId(p.dir));
      if (wrap) {
        wrap.style.transition = 'box-shadow 0.3s';
        wrap.style.boxShadow = '0 0 0 2px #6366f1';
        setTimeout(() => { wrap.style.boxShadow = ''; }, 2000);
      }
    }
  }
}

let es;
function connectSSE() {
  if (es) es.close();
  es = new EventSource('/api/stream');

  es.onopen = () => setConnectionStatus(true);

  es.onmessage = (e) => {
    try {
      const projects = JSON.parse(e.data);
      applyUpdate(projects);
    } catch {}
  };

  es.onerror = () => {
    setConnectionStatus(false);
    es.close();
    // Reconnect after 4 seconds
    setTimeout(connectSSE, 4000);
  };
}

async function load() {
  // Manual refresh — one-shot fetch then re-open SSE
  try {
    const res = await fetch('/api/projects');
    const projects = await res.json();
    applyUpdate(projects);
  } catch {}
}

connectSSE();
</script>
</body>
</html>
